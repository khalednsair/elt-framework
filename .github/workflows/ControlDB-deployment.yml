name: ControlDB Deployment
on: workflow_dispatch 
jobs:
    release:      
      runs-on: windows-latest
      steps:
        - name: Checkout code 
          uses: actions/checkout@v3
        - name: Display checkout files and folders
          run: Get-ChildItem ${{github.workspace}} -Recurse
                  
        - name: Sanity check secrets (length only)
          shell: pwsh
          run: |
            $lengths = @{
              CLIENT_ID = "${{ secrets.ACTION_SPN_CLIENTID }}".Length
              CLIENT_SECRET = "${{ secrets.ACTION_SPN_SECRET }}".Length
              SUBSCRIPTION_ID = "${{ secrets.SUBSCRIPTION_ID }}".Length
              TENANT_ID = "${{ secrets.TENANT_ID }}".Length
            }
            $lengths.GetEnumerator() | ForEach-Object { Write-Host "$($_.Key): $($_.Value)" }

        - name: Azure Login
          uses: Azure/login@v1
          with:
           creds: '{"clientId":"${{ secrets.ACTION_SPN_CLIENTID }}","clientSecret":"${{ secrets.ACTION_SPN_SECRET }}","subscriptionId":"${{ secrets.SUBSCRIPTION_ID }}","tenantId":"${{ secrets.TENANT_ID }}"}'
        - name: Build and Deploy SQL Database
          uses: Azure/sql-action@v2
          with:
            connection-string: ${{secrets.CONTROLDB_CONNECTIONSTRING}}
            path: ${{github.workspace}}\elt-framework\ControlDB\ELT\Database.sqlproj
            action: 'Publish'
            arguments: >
              /p:DropPermissionsNotInSource=false
              /p:BlockOnPossibleDataLoss=false
              /p:DropRoleMembersNotInSource=false
              /p:DropObjectsNotInSource=false
              /p:IgnoreColumnOrder=true
              /p:IgnorePermissions=true
              /p:AllowIncompatiblePlatform=true
              /p:ExcludeObjectTypes=Logins;Users
        - name: Azure Logout
          run: |
            az logout
